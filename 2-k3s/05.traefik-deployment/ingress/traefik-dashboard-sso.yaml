---
# Traefik Dashboard - Protected with Authentik SSO
#
# Prerequisites:
# 1. Proxy Provider in Authentik: "Forward auth (single application)"
#    - External host: https://traefik.epaflix.com
# 2. Application in Authentik linked to the provider
# 3. authentik-forwardauth middleware applied

# HTTP to HTTPS redirect
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard-http
  namespace: traefik-system
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`traefik.epaflix.com`)
      kind: Rule
      middlewares:
        - name: redirect-https
          namespace: traefik-system
      services:
        - kind: TraefikService
          name: api@internal

---
# Dashboard route - protected by ForwardAuth middleware
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard-protected
  namespace: traefik-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.epaflix.com`)
      kind: Rule
      priority: 10
      middlewares:
        - name: authentik-forwardauth
          namespace: traefik-system
      services:
        - kind: TraefikService
          name: api@internal
  tls:
    certResolver: cloudflare
    domains:
      - main: epaflix.com
        sans:
          - "*.epaflix.com"

---
# Outpost route - handles auth callback on traefik.epaflix.com
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard-outpost
  namespace: traefik-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.epaflix.com`) && PathPrefix(`/outpost.goauthentik.io/`)
      kind: Rule
      priority: 15
      services:
        - name: authentik-server
          namespace: app-authentik
          port: 80
  tls:
    certResolver: cloudflare
    domains:
      - main: epaflix.com
        sans:
          - "*.epaflix.com"
