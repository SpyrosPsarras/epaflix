---
# Proxy truenas.epaflix.com (192.168.10.101, Traefik) → TrueNAS SCALE UI (192.168.10.200:443)
#
# Real Let's Encrypt wildcard cert terminates at Traefik.
# Backend is TrueNAS with a self-signed cert, so serversTransport skips verify.
# DNS for truenas.epaflix.com is internal-only (Pi-hole address= → 192.168.10.101).
# No public A record needed — DNS-01 ACME via Cloudflare proves domain ownership.

apiVersion: v1
kind: Endpoints
metadata:
  name: truenas-ui
  namespace: traefik-system
subsets:
  - addresses:
      - ip: 192.168.10.200
    ports:
      - name: https
        port: 443
        protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: truenas-ui
  namespace: traefik-system
  labels:
    app: truenas-ui
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: https
      port: 443
      protocol: TCP

---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: truenas-insecure
  namespace: traefik-system
spec:
  insecureSkipVerify: true
  serverName: truenas.epaflix.com

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: truenas-http
  namespace: traefik-system
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`truenas.epaflix.com`)
      kind: Rule
      middlewares:
        - name: redirect-https
          namespace: traefik-system
      services:
        - name: truenas-ui
          port: 443

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: truenas-https
  namespace: traefik-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`truenas.epaflix.com`)
      kind: Rule
      services:
        - name: truenas-ui
          port: 443
          scheme: https
          serversTransport: truenas-insecure
  tls:
    certResolver: cloudflare
    domains:
      - main: epaflix.com
        sans:
          - "*.epaflix.com"
