---
# TLS Options for Traefik
#
# Configures modern, secure TLS settings with broad browser compatibility
# Fixes SSL_ERROR_NO_CYPHER_OVERLAP errors in Firefox and other browsers
#
# Installation:
#   kubectl apply -f tls-options.yaml
#
# Reference: https://doc.traefik.io/traefik/https/tls/#tls-options

apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: default
  namespace: traefik-system
spec:
  minVersion: VersionTLS12
  maxVersion: VersionTLS13
  cipherSuites:
    # TLS 1.3 cipher suites (preferred)
    - TLS_AES_128_GCM_SHA256
    - TLS_AES_256_GCM_SHA384
    - TLS_CHACHA20_POLY1305_SHA256
    # TLS 1.2 cipher suites (for compatibility)
    - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
    - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
    - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
    - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
  curvePreferences:
    - CurveP521
    - CurveP384
  sniStrict: false
  preferServerCipherSuites: true
