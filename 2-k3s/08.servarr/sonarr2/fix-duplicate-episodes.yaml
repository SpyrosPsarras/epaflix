---
apiVersion: batch/v1
kind: Job
metadata:
  name: fix-sonarr2-duplicate-episodes
  namespace: servarr
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: fix-duplicates
        image: postgres:15-alpine
        env:
        - name: PGHOST
          value: "192.168.10.105"
        - name: PGUSER
          value: "sonarr2"
        - name: PGDATABASE
          value: "sonarr2-main"
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: servarr-postgres
              key: sonarr2-password
        command:
        - /bin/sh
        - -c
        - |
          set -e

          echo "=========================================="
          echo "Sonarr2 Duplicate Episodes Fix"
          echo "=========================================="
          echo ""

          echo "📊 Current State:"
          psql -c "SELECT COUNT(*) as total_episodes FROM \"Episodes\";"
          psql -c "SELECT MAX(\"Id\") as max_id FROM \"Episodes\";"
          psql -c "SELECT last_value as sequence_value FROM \"Episodes_Id_seq\";"
          echo ""

          echo "🔍 Duplicate Episode IDs:"
          psql -c "SELECT \"Id\", COUNT(*) FROM \"Episodes\" GROUP BY \"Id\" HAVING COUNT(*) > 1 ORDER BY \"Id\";" | head -20
          echo ""

          echo "🔧 Starting fix..."
          echo ""

          # Create fix SQL file
          cat > /tmp/fix-duplicates.sql << 'EOSQL'
          -- Sonarr2 Episodes Duplicate Fix
          BEGIN;

          -- Create temp table with one row per unique episode ID (keep earliest by ctid)
          CREATE TEMP TABLE episodes_to_keep AS
          SELECT DISTINCT ON ("Id")
            "Id",
            ctid as keep_ctid
          FROM "Episodes"
          ORDER BY "Id", ctid;

          -- Show counts before deletion
          \echo 'Before deletion:'
          SELECT COUNT(*) as total_episodes FROM "Episodes";

          -- Delete duplicate rows (keep only the ones in episodes_to_keep)
          DELETE FROM "Episodes" e
          WHERE NOT EXISTS (
            SELECT 1 FROM episodes_to_keep k
            WHERE k."Id" = e."Id" AND k.keep_ctid = e.ctid
          );

          \echo 'After deletion:'
          SELECT COUNT(*) as total_episodes FROM "Episodes";

          -- Fix the sequence to prevent future duplicates
          SELECT setval('"Episodes_Id_seq"', (SELECT MAX("Id") FROM "Episodes") + 1, false);

          -- Verify no duplicates remain
          \echo 'Verification - Remaining duplicates (should be 0):'
          SELECT COUNT(*) as duplicate_count
          FROM (
            SELECT "Id"
            FROM "Episodes"
            GROUP BY "Id"
            HAVING COUNT(*) > 1
          ) duplicates;

          COMMIT;
          EOSQL

          # Execute the fix
          psql -f /tmp/fix-duplicates.sql

          echo ""
          echo "✅ Fix completed!"
          echo ""
          echo "📊 Final State:"
          psql -c "SELECT COUNT(*) as total_episodes FROM \"Episodes\";"
          psql -c "SELECT MAX(\"Id\") as max_id FROM \"Episodes\";"
          psql -c "SELECT last_value as sequence_value FROM \"Episodes_Id_seq\";"
          echo ""
          echo "=========================================="
