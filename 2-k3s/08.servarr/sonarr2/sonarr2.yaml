---
# Sonarr2 - Anime Manager
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr2
  namespace: servarr
  labels:
    app: sonarr2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarr2
  template:
    metadata:
      labels:
        app: sonarr2
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: sonarr2
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
      containers:
        - name: sonarr2
          image: lscr.io/linuxserver/sonarr:latest
          env:
            - name: PUID
              value: "568"
            - name: PGID
              value: "568"
            - name: TZ
              value: "Europe/Oslo"
            # Using SQLite (PostgreSQL disabled due to permission issues)
          ports:
            - containerPort: 8989
              name: http
          volumeMounts:
            - name: config
              mountPath: /config
            - name: animes
              mountPath: /animes
            - name: downloads
              mountPath: /downloads
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sonarr2-config
        - name: animes
          persistentVolumeClaim:
            claimName: servarr-media-animes
        - name: downloads
          persistentVolumeClaim:
            claimName: servarr-media-downloads
---
apiVersion: v1
kind: Service
metadata:
  name: sonarr2
  namespace: servarr
  labels:
    app: sonarr2
spec:
  type: ClusterIP
  selector:
    app: sonarr2
  ports:
    - name: http
      port: 8989
      targetPort: http
