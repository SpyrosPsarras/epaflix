---
apiVersion: batch/v1
kind: Job
metadata:
  name: fix-radarr-duplicate-movies
  namespace: servarr
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: fix-duplicates
        image: postgres:15-alpine
        env:
        - name: PGHOST
          value: "192.168.10.105"
        - name: PGUSER
          value: "radarr"
        - name: PGDATABASE
          value: "radarr-main"
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: servarr-postgres
              key: radarr-password
        command:
        - /bin/sh
        - -c
        - |
          set -e

          echo "=========================================="
          echo "Radarr Duplicate Movies Fix"
          echo "=========================================="
          echo ""

          echo "📊 Current State:"
          psql -c "SELECT COUNT(*) as total_movies FROM \"Movies\";"
          psql -c "SELECT MAX(\"Id\") as max_id FROM \"Movies\";"
          psql -c "SELECT last_value as sequence_value FROM \"Movies_Id_seq\";"
          echo ""

          echo "🔍 Duplicate Movie IDs:"
          psql -c "SELECT \"Id\", COUNT(*) FROM \"Movies\" GROUP BY \"Id\" HAVING COUNT(*) > 1 ORDER BY \"Id\";"
          echo ""

          echo "📝 Details of duplicates:"
          psql -c "SELECT \"Id\", \"TmdbId\", \"Title\", \"CleanTitle\" FROM \"Movies\" WHERE \"Id\" IN (SELECT \"Id\" FROM \"Movies\" GROUP BY \"Id\" HAVING COUNT(*) > 1) ORDER BY \"Id\";"
          echo ""

          echo "🔧 Starting fix..."
          echo ""

          # Create fix SQL file
          cat > /tmp/fix-duplicates.sql << 'EOSQL'
          -- Radarr Movies Duplicate Fix
          BEGIN;

          -- Create temp table with one row per unique movie ID (keep earliest by ctid)
          CREATE TEMP TABLE movies_to_keep AS
          SELECT DISTINCT ON ("Id")
            "Id",
            ctid as keep_ctid
          FROM "Movies"
          ORDER BY "Id", ctid;

          -- Show counts before deletion
          \echo 'Before deletion:'
          SELECT COUNT(*) as total_movies FROM "Movies";

          -- Delete duplicate rows (keep only the ones in movies_to_keep)
          DELETE FROM "Movies" m
          WHERE NOT EXISTS (
            SELECT 1 FROM movies_to_keep k
            WHERE k."Id" = m."Id" AND k.keep_ctid = m.ctid
          );

          \echo 'After deletion:'
          SELECT COUNT(*) as total_movies FROM "Movies";

          -- Fix the sequence to prevent future duplicates
          SELECT setval('"Movies_Id_seq"', (SELECT MAX("Id") FROM "Movies") + 1, false);

          -- Verify no duplicates remain
          \echo 'Verification - Remaining duplicates (should be 0):'
          SELECT COUNT(*) as duplicate_count
          FROM (
            SELECT "Id"
            FROM "Movies"
            GROUP BY "Id"
            HAVING COUNT(*) > 1
          ) duplicates;

          COMMIT;
          EOSQL

          # Execute the fix
          psql -f /tmp/fix-duplicates.sql

          echo ""
          echo "✅ Fix completed!"
          echo ""
          echo "📊 Final State:"
          psql -c "SELECT COUNT(*) as total_movies FROM \"Movies\";"
          psql -c "SELECT MAX(\"Id\") as max_id FROM \"Movies\";"
          psql -c "SELECT last_value as sequence_value FROM \"Movies_Id_seq\";"
          echo ""
          echo "🔍 Verify no duplicates remain:"
          psql -c "SELECT \"Id\", COUNT(*) FROM \"Movies\" GROUP BY \"Id\" HAVING COUNT(*) > 1;"
          echo ""
          echo "=========================================="
