---
# PostgreSQL connection credentials for *arr apps
# Create this secret with actual passwords before deploying apps
apiVersion: v1
kind: Secret
metadata:
  name: servarr-postgres
  namespace: servarr
type: Opaque
stringData:
  # Sonarr (TV Shows)
  sonarr-host: "192.168.10.105" # Direct connection - pooler auth incompatible
  sonarr-port: "5432"
  sonarr-database: "sonarr-main"
  sonarr-user: "sonarr"
  sonarr-password: "<SONARR_DB_PASSWORD>"

  # Sonarr2 (Anime)
  sonarr2-host: "192.168.10.105" # Direct connection - pooler auth incompatible
  sonarr2-port: "5432"
  sonarr2-database: "sonarr2-main"
  sonarr2-user: "sonarr2"
  sonarr2-password: "<SONARR2_DB_PASSWORD>"

  # Radarr (Movies)
  radarr-host: "192.168.10.105" # Direct connection - pooler auth incompatible
  radarr-port: "5432"
  radarr-database: "radarr-main"
  radarr-user: "radarr"
  radarr-password: "<RADARR_DB_PASSWORD>"

  # Prowlarr (Indexers)
  prowlarr-host: "192.168.10.105" # Direct connection - pooler auth incompatible
  prowlarr-port: "5432"
  prowlarr-database: "prowlarr-main"
  prowlarr-user: "prowlarr"
  prowlarr-password: "<PROWLARR_DB_PASSWORD>"

  # Jellyseerr (Requests)
  jellyseerr-host: "192.168.10.105" # Direct connection - pooler auth issues
  jellyseerr-port: "5432"
  jellyseerr-database: "jellyseerr"
  jellyseerr-user: "jellyseerr"
  jellyseerr-password: "<JELLYSEERR_DB_PASSWORD>"
