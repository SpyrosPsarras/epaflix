---
# qBittorrent WireGuard VPN Configuration
# This secret contains the WireGuard config extracted from TrueNAS
#
# Source: /mnt/apps/qbittorrent/wireguard/wg0.conf
#
# Before applying:
# 1. Extract the full wg0.conf from TrueNAS (including PrivateKey)
# 2. Create the secret using kubectl create secret generic command
#
# Creation command:
# kubectl create secret generic qbittorrent-wireguard \
#   --from-file=wg0.conf=/path/to/wg0.conf \
#   -n servarr
#
# Or manually create from the template below:

apiVersion: v1
kind: Secret
metadata:
  name: qbittorrent-wireguard
  namespace: servarr
type: Opaque
stringData:
  wg0.conf: |
    [Interface]
    Address = 10.13.13.2
    PrivateKey = REPLACE_WITH_ACTUAL_PRIVATE_KEY
    ListenPort = 51820
    DNS = 10.13.13.1

    [Peer]
    PublicKey = lFKkzorLS/TiHHERtaJ3F7aLDHSQDlgXPBYB0fDElgc=
    PresharedKey = REPLACE_WITH_ACTUAL_PRESHARED_KEY
    Endpoint = 45.86.221.65:12662
    AllowedIPs = 0.0.0.0/0
