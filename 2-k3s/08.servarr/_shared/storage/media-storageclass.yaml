---
# Media Storage Class for static PV provisioning with hostPath
# Used for media files that are stored on NFS mounts at /mnt/k3s-*
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: media-storage
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
