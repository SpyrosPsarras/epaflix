# Config storage for *arr apps (Sonarr, Radarr, Prowlarr, Bazarr)
# Uses local-path StorageClass with dynamic provisioning
# Data stored on k3s node iSCSI storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sonarr-config
  namespace: servarr
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
