---
# Public Internet-facing IngressRoutes with Let's Encrypt TLS
# Jellyfin - Media Server
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin-https
  namespace: servarr
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`jellyfin.epaflix.com`)
      kind: Rule
      services:
        - name: jellyfin
          port: 8096
  tls:
    certResolver: cloudflare
    domains:
      - main: epaflix.com
        sans:
          - "*.epaflix.com"
---
# HTTP to HTTPS redirect for Jellyfin
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin-http
  namespace: servarr
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`jellyfin.epaflix.com`)
      kind: Rule
      middlewares:
        - name: redirect-https
          namespace: traefik-system
      services:
        - name: jellyfin
          port: 8096
---
# Seerr - Media Requests (migrated from Jellyseerr)
