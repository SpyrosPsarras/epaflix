---
# Authentik OIDC Secret for Jellyseerr/Seerr
#
# CRITICAL: This file should NOT be committed with actual credentials!
# This is a TEMPLATE. Replace placeholders with actual values from Authentik.
#
# To get Client ID and Client Secret:
# 1. Log into Authentik at https://auth.epaflix.com
# 2. Navigate to Applications → Providers
# 3. Find or create the "Jellyseerr" OAuth2/OIDC provider
# 4. Copy the Client ID and Client Secret
#
# To create the secret:
#   kubectl apply -f authentik-oidc-secret.yaml
#
# To update the secret:
#   kubectl delete secret seerr-oidc-secret -n servarr
#   kubectl apply -f authentik-oidc-secret.yaml
#
# To view the secret (for debugging):
#   kubectl get secret seerr-oidc-secret -n servarr -o yaml
#   kubectl get secret seerr-oidc-secret -n servarr -o jsonpath='{.data.client-id}' | base64 -d

apiVersion: v1
kind: Secret
metadata:
  name: seerr-oidc-secret
  namespace: servarr
  labels:
    app: seerr
    component: oidc-auth
type: Opaque
stringData:
  # OAuth2/OIDC Client ID from Authentik provider (see secrets.yml)
  client-id: "<AUTHENTIK_CLIENT_ID>"

  # OAuth2/OIDC Client Secret from Authentik provider (see secrets.yml)
  client-secret: "<AUTHENTIK_CLIENT_SECRET>"

---
# Alternative: Create secret from command line (recommended for production)
# This avoids storing credentials in YAML files
#
# kubectl create secret generic seerr-oidc-secret -n servarr \
#   --from-literal=client-id='<YOUR_CLIENT_ID>' \
#   --from-literal=client-secret='<YOUR_CLIENT_SECRET>' \
#   --dry-run=client -o yaml | kubectl apply -f -
#
# Or use kubectl directly:
# kubectl create secret generic seerr-oidc-secret -n servarr \
#   --from-literal=client-id='<YOUR_CLIENT_ID>' \
#   --from-literal=client-secret='<YOUR_CLIENT_SECRET>'
