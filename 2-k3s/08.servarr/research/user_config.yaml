"lingarr":
  "services":
    "libretranslate":
      "container_name": "LibreTranslate"
      "deploy":
        "resources":
          "reservations":
            "devices":
            - "capabilities":
              - "gpu"
              "count": 1
              "driver": "nvidia"
      "environment":
      - "LT_LOAD_ONLY=el,en"
      "healthcheck":
        "interval": "10s"
        "retries": 4
        "start_period": "5s"
        "test":
        - "CMD-SHELL"
        - "python scripts/healthcheck.py"
        "timeout": "4s"
      "image": "libretranslate/libretranslate:v1.8.1-cuda"
      "ports":
      - "5000:5000"
      "restart": "unless-stopped"
      "volumes":
      - "/mnt/apps/libretranslate:/home/libretranslate/.local/"
    "libretranslate-waiter":
      "depends_on":
        "libretranslate":
          "condition": "service_healthy"
      "entrypoint": |
        sh -c "
          echo 'Waiting for LibreTranslate...';
          for i in $(seq 1 30); do
            curl -fs http://libretranslate:5000/ && echo 'LibreTranslate is up!' && exit 0;
            sleep 2;
          done;
          echo 'LibreTranslate did not start in time.' >&2;
          exit 1;
        "
      "image": "curlimages/curl:latest"
    "lingarr":
      "container_name": "lingarr"
      "depends_on":
        "libretranslate-waiter":
          "condition": "service_completed_successfully"
      "environment":
      - "PUID=568"
      - "PGID=568"
      - "ASPNETCORE_URLS=http://+:9876"
      "image": "lingarr/lingarr:latest"
      "ports":
      - "9876:9876"
      "restart": "unless-stopped"
      "user": "568:568"
      "volumes":
      - "/mnt/pool1/dataset01/movies:/movies"
      - "/mnt/pool1/dataset01/tvshows:/tv"
      - "/mnt/apps/lingarr:/app/config"
