"qbittorrent":
  "services":
    "qbittorrent-wireguard":
      "cap_add":
      - "NET_ADMIN"
      "container_name": "qbittorrent-wireguard"
      "entrypoint":
      - "/bin/bash"
      - "/start.sh"
      "environment":
      - "PUID=568"
      - "PGID=568"
      - "LAN_NETWORK=192.168.10.0/24"
      - "QBT_LEGAL_NOTICE=confirm"
      - "TZ=Europe/Oslo"
      "image": "tenseiken/qbittorrent-wireguard:latest"
      "ipc": "private"
      "network_mode": "bridge"
      "ports":
      - "8080:8080"
      - "8999:8999/tcp"
      - "8999:8999/udp"
      "restart": "unless-stopped"
      "security_opt":
      - "label=disable"
      "stdin_open": true
      "sysctls":
      - "net.ipv4.conf.all.src_valid_mark=1"
      - "net.ipv6.conf.all.disable_ipv6=0"
      "tty": true
      "volumes":
      - "/mnt/pool1/dataset01/downloads:/downloads"
      - "/mnt/apps/qbittorrent:/config"
      "working_dir": "/opt"
