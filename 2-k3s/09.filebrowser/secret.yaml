---
# FileBrowser OIDC Secret
# Create this secret with your Authentik OAuth2/OIDC client ID and secret
# kubectl create secret generic filebrowser-oidc -n filebrowser --from-literal=client-id='filebrowser' --from-literal=client-secret='YOUR_SECRET_HERE'
apiVersion: v1
kind: Secret
metadata:
  name: filebrowser-oidc
  namespace: filebrowser
type: Opaque
stringData:
  # Replace with actual values from Authentik OAuth2/OIDC Provider
  client-id: "<FILEBROWSER_OIDC_CLIENT_ID>"
  client-secret: "<FILEBROWSER_OIDC_CLIENT_SECRET>"
