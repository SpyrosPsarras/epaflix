---
# FileBrowser - HTTPS IngressRoute with Let's Encrypt TLS via Cloudflare
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: filebrowser-https
  namespace: filebrowser
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`filebrowser.epaflix.com`)
      kind: Rule
      services:
        - name: filebrowser
          port: 80
  tls:
    certResolver: cloudflare
    domains:
      - main: epaflix.com
        sans:
          - "*.epaflix.com"
---
# HTTP to HTTPS redirect for FileBrowser
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: filebrowser-http
  namespace: filebrowser
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`filebrowser.epaflix.com`)
      kind: Rule
      middlewares:
        - name: redirect-https
          namespace: traefik-system
      services:
        - name: filebrowser
          port: 80
