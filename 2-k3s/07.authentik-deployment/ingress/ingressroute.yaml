---
# HTTP IngressRoute - Redirect to HTTPS
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authentik-http
  namespace: app-authentik
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`auth.epaflix.com`)
      kind: Rule
      middlewares:
        - name: redirect-https
          namespace: traefik-system
      services:
        - name: authentik-server
          port: 80

---
# HTTPS IngressRoute - Let's Encrypt via Cloudflare DNS-01
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authentik-https
  namespace: app-authentik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`auth.epaflix.com`)
      kind: Rule
      services:
        - name: authentik-server
          port: 80
  tls:
    certResolver: cloudflare
    domains:
      - main: epaflix.com
        sans:
          - "*.epaflix.com"
