---
# Grafana OAuth Secret Template
# IMPORTANT: Replace with actual Authentik OAuth2/OIDC credentials

# To create OAuth provider in Authentik:
# 1. Login to https://auth.epaflix.com
# 2. Navigate to Applications → Providers
# 3. Click "Create" → "OAuth2/OpenID Provider"
# 4. Name: Grafana Monitor
# 5. Authorization flow: default-provider-authorization-implicit-consent
# 6. Client type: Confidential
# 7. Redirect URIs: https://grafana.epaflix.com/login/generic_oauth
# 8. Scopes: openid, email, profile
# 9. Copy Client ID and Client Secret
# 10. Replace values below

apiVersion: v1
kind: Secret
metadata:
  name: grafana-oauth-secret
  namespace: observability
type: Opaque
stringData:
  client-id: "REPLACE_WITH_AUTHENTIK_CLIENT_ID"
  client-secret: "REPLACE_WITH_AUTHENTIK_CLIENT_SECRET"
