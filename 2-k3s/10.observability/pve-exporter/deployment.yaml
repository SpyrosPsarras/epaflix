---
# Proxmox VE Exporter Deployment
# Scrapes metrics from Proxmox hosts
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pve-exporter
  namespace: observability
  labels:
    app: pve-exporter
spec:
  replicas: 1 # Single replica - Proxmox clustering means one exporter gets all nodes
  selector:
    matchLabels:
      app: pve-exporter
  template:
    metadata:
      labels:
        app: pve-exporter
    spec:
      containers:
        - name: pve-exporter
          image: prompve/prometheus-pve-exporter:latest
          ports:
            - containerPort: 9221
              name: metrics
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

          livenessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30

          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10

      volumes:
        - name: config
          configMap:
            name: pve-exporter-config
