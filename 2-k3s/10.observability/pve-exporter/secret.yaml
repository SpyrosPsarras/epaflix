---
# Proxmox VE Exporter Secret
# IMPORTANT: Replace the token values with actual API tokens from Proxmox

# To create API tokens on Proxmox:
# 1. Login to Proxmox UI (https://192.168.10.10:8006 or https://192.168.10.11:8006)
# 2. Navigate to: Datacenter → Permissions → API Tokens
# 3. Click "Add" button
# 4. User: monitoring@pve (or create this user first)
# 5. Token ID: prometheus
# 6. Privilege Separation: OFF (unchecked)
# 7. Copy the generated token value
# 8. Encode to base64: echo -n 'your-token-value' | base64
# 9. Replace REPLACE_ME_BASE64 values below

apiVersion: v1
kind: Secret
metadata:
  name: pve-exporter-secrets
  namespace: observability
type: Opaque
data:
  # Takaros token (192.168.10.10)
  # Format: root@pam!grafana=<token-value>
  takaros-token: <BASE64_ENCODED_PROXMOX_API_TOKEN>

  # Evanthoulaki token (192.168.10.11)
  evanthoulaki-token: <BASE64_ENCODED_PROXMOX_API_TOKEN>
