---
# Proxmox VE Exporter ServiceMonitor
# Note: Proxmox hosts are clustered - scraping one host returns metrics for the entire cluster
# We only scrape evanthoulaki (192.168.10.11) to avoid duplicate metrics
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pve-exporter
  namespace: observability
  labels:
    app: pve-exporter
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: pve-exporter
  endpoints:
    # Scrape evanthoulaki (192.168.10.11) - returns cluster-wide metrics for both nodes
    - port: metrics
      interval: 60s
      scrapeTimeout: 30s
      path: /pve
      params:
        target: ["192.168.10.11"]
        module: ["default"]
      relabelings:
        # Set instance to the Proxmox cluster endpoint instead of pod IP
        - targetLabel: instance
          replacement: "192.168.10.11"
        - targetLabel: cluster
          replacement: "e-pavli"
