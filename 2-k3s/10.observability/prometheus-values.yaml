# kube-prometheus-stack Helm Values
# Prometheus + Grafana + AlertManager + node-exporter + kube-state-metrics

# Prometheus configuration
prometheus:
  prometheusSpec:
    replicas: 1 # Single replica due to PV limitations
    retention: 15d
    retentionSize: "45GB"

    # Resource limits
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi

    # Storage configuration
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 25Gi

    # Enable service monitors
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # Additional scrape configs for Cilium and Hubble
    additionalScrapeConfigs:
      - job_name: "cilium-agent"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - kube-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_k8s_app]
            action: keep
            regex: cilium
          - source_labels: [__address__]
            action: replace
            regex: '([^:]+)(?::\d+)?'
            replacement: "${1}:9962"
            target_label: __address__

      - job_name: "hubble"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - kube-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_k8s_app]
            action: keep
            regex: cilium
          - source_labels: [__address__]
            action: replace
            regex: '([^:]+)(?::\d+)?'
            replacement: "${1}:9965"
            target_label: __address__

# Grafana configuration
grafana:
  enabled: true
  replicas: 2

  # Topology spread constraints for even distribution
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: grafana

  # Admin credentials
  adminPassword: "<POSTGRES_PASSWORD>"

  # Disable default datasource to avoid conflicts
  sidecar:
    datasources:
      enabled: true
      defaultDatasourceEnabled: false

  # Mount database password secret and OAuth secret
  extraSecretMounts:
    - name: grafana-db-secret
      secretName: grafana-db-secret
      defaultMode: 0440
      mountPath: /etc/secrets/grafana-db
      readOnly: true
    - name: grafana-oauth-secret
      secretName: grafana-oauth-secret
      defaultMode: 0440
      mountPath: /etc/secrets/grafana-oauth
      readOnly: true

  # Grafana configuration
  grafana.ini:
    server:
      domain: grafana.epaflix.com
      root_url: https://grafana.epaflix.com
      serve_from_sub_path: false

    database:
      type: postgres
      host: postgres-rw.postgres-system.svc.cluster.local:5432
      name: observability
      user: observability
      password: $__file{/etc/secrets/grafana-db/password}

    auth:
      disable_login_form: false
      oauth_auto_login: false

    auth.generic_oauth:
      enabled: true
      name: Authentik
      client_id: <GRAFANA_OAUTH_CLIENT_ID>
      client_secret: $__file{/etc/secrets/grafana-oauth/client_secret}
      scopes: openid email profile
      auth_url: https://auth.epaflix.com/application/o/authorize/
      token_url: https://auth.epaflix.com/application/o/token/
      api_url: https://auth.epaflix.com/application/o/userinfo/
      role_attribute_path: contains(groups[*], 'Grafana Admins') && 'Admin' || contains(groups[*], 'Grafana Editors') && 'Editor' || 'Viewer'
      allow_sign_up: true
      auto_login: false
      use_pkce: true

  # Datasources
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
          access: proxy
          isDefault: true

        - name: Loki
          type: loki
          url: http://loki-gateway.observability.svc.cluster.local
          access: proxy
          jsonData:
            maxLines: 1000

  # Dashboard providers
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "kubernetes-cluster"
          orgId: 1
          folder: "Kubernetes Cluster"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/kubernetes-cluster

        - name: "network-service-mesh"
          orgId: 1
          folder: "Network & Service Mesh"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/network-service-mesh

        - name: "infrastructure"
          orgId: 1
          folder: "Infrastructure"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/infrastructure

        - name: "logs"
          orgId: 1
          folder: "Logs"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/logs

  # Dashboard auto-import from grafana.com
  # Note: Auto-import creates datasource variable issues - use built-in dashboards instead
  # Built-in dashboards from kube-prometheus-stack are better and already configured
  dashboards: {}
    # kubernetes-cluster:
    #   kubernetes-cluster-overview:
    #     gnetId: 315
    #     revision: 3
    #     datasource: Prometheus
    #   node-exporter-full:
    #     gnetId: 1860
    #     revision: 37
    #     datasource: Prometheus
    # network-service-mesh:
    #   cilium-hubble-overview:
    #     gnetId: 16611
    #     revision: 2
    #     datasource: Prometheus
    #   istio-control-plane:
    #     gnetId: 7645
    #     revision: 225
    #     datasource: Prometheus
    #   istio-service-dashboard:
    #     gnetId: 7636
    #     revision: 225
    #     datasource: Prometheus
    # infrastructure:
    # Dashboard 10347 imported manually - auto-import creates unresolved datasource variable
    # proxmox-ve-cluster:
    #   gnetId: 10347
    #   revision: 5
    #   datasource: Prometheus

  # Persistence disabled (using PostgreSQL)
  persistence:
    enabled: false

  # Resources
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # Ingress disabled (using Traefik IngressRoute)
  ingress:
    enabled: false

# AlertManager configuration
alertmanager:
  alertmanagerSpec:
    replicas: 3

    # Topology spread constraints for even distribution
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: alertmanager

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  config:
    global:
      resolve_timeout: 5m
      smtp_smarthost: "mail.epaflix.com:587"
      smtp_from: "noreply@epaflix.com"
      smtp_auth_username: "truenas_admin"
      smtp_auth_password: "<SMTP_PASSWORD>"
      smtp_require_tls: true

    route:
      group_by: ["alertname", "cluster", "namespace", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "email"
      routes:
        - match:
            severity: critical
          receiver: "email"
          continue: true

    receivers:
      - name: "email"
        email_configs:
          - to: "admin@epaflix.com"
            headers:
              Subject: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] Kubernetes Alert: {{ .GroupLabels.alertname }}'
            html: |
              {{ range .Alerts }}
              <b>Alert:</b> {{ .Labels.alertname }}<br>
              <b>Severity:</b> {{ .Labels.severity }}<br>
              <b>Namespace:</b> {{ .Labels.namespace }}<br>
              <b>Description:</b> {{ .Annotations.description }}<br>
              <b>Summary:</b> {{ .Annotations.summary }}<br>
              <hr>
              {{ end }}

# node-exporter configuration
prometheus-node-exporter:
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

  resources:
    requests:
      cpu: 100m
      memory: 100Mi
    limits:
      cpu: 200m
      memory: 200Mi

# kube-state-metrics configuration
kube-state-metrics:
  replicas: 2

  # Topology spread constraints for even distribution
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: kube-state-metrics

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

# Default ServiceMonitors
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserver: true
    kubeApiserverAvailability: true
    kubeApiserverSlos: true
    kubelet: true
    kubeProxy: false # Disabled because using Cilium
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeScheduler: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

# Component scraping
kubelet:
  enabled: true
kubeApiServer:
  enabled: true
kubeControllerManager:
  enabled: true
coreDns:
  enabled: true
kubeEtcd:
  enabled: true
kubeScheduler:
  enabled: true
kubeProxy:
  enabled: false # Disabled because using Cilium
