---
# Prometheus PersistentVolumeClaim
# Uses local-path StorageClass (iSCSI-backed node storage)
# 25Gi storage for metrics (worker nodes have 40GB total disk)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-storage
  namespace: observability
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 25Gi
