---
# Grafana HTTPS IngressRoute
# https://grafana.epaflix.com

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-https
  namespace: observability
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`grafana.epaflix.com`)
      services:
        - name: kube-prometheus-stack-grafana
          port: 80
  tls:
    certResolver: cloudflare
---
# HTTP to HTTPS redirect for Grafana
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-http
  namespace: observability
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`grafana.epaflix.com`)
      middlewares:
        - name: redirect-https
          namespace: traefik-system
      services:
        - name: kube-prometheus-stack-grafana
          port: 80
