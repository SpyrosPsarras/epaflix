---
apiVersion: v1
kind: Service
metadata:
  name: postgres-rw
  namespace: postgres-system
  labels:
    app: postgres
    service-type: primary
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.10.105
  selector:
    cnpg.io/cluster: postgres-cluster
    role: primary
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  sessionAffinity: None
