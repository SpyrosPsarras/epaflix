---
apiVersion: v1
kind: Service
metadata:
  name: postgres-r
  namespace: postgres-system
  labels:
    app: postgres
    service-type: any
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.10.107
  selector:
    cnpg.io/cluster: postgres-cluster
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  sessionAffinity: None
