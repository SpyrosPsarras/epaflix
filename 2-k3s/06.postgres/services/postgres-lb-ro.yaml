---
apiVersion: v1
kind: Service
metadata:
  name: postgres-ro
  namespace: postgres-system
  labels:
    app: postgres
    service-type: replica
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.10.106
  selector:
    cnpg.io/cluster: postgres-cluster
    role: replica
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  sessionAffinity: None
