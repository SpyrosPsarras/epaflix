---
# Network Speed Test Between Proxmox Hosts
# This deploys iperf3 server on worker-61 and client on worker-62
# to test the bonded network throughput between Proxmox hosts

apiVersion: v1
kind: Service
metadata:
  name: iperf3-server
spec:
  selector:
    app: iperf3-server
  ports:
    - name: iperf3
      port: 5201
      targetPort: 5201
      protocol: TCP
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iperf3-server
  labels:
    app: iperf3-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iperf3-server
  template:
    metadata:
      labels:
        app: iperf3-server
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3s-worker-61
      containers:
        - name: iperf3
          image: networkstatic/iperf3
          command: ["iperf3"]
          args: ["-s"]
          ports:
            - containerPort: 5201
              name: iperf3
          resources:
            requests:
              cpu: 500m
              memory: 128Mi
            limits:
              cpu: 2000m
              memory: 256Mi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iperf3-client
  labels:
    app: iperf3-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iperf3-client
  template:
    metadata:
      labels:
        app: iperf3-client
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3s-worker-62
      containers:
        - name: iperf3
          image: networkstatic/iperf3
          command: ["sleep"]
          args: ["infinity"]
          resources:
            requests:
              cpu: 500m
              memory: 128Mi
            limits:
              cpu: 2000m
              memory: 256Mi

---
# To run the test:
#
# 1. Deploy:
#    kubectl apply -f test-network-speed.yaml
#
# 2. Wait for pods to be ready:
#    kubectl wait --for=condition=ready pod -l app=iperf3-server --timeout=60s
#    kubectl wait --for=condition=ready pod -l app=iperf3-client --timeout=60s
#
# 3. Get the server ClusterIP:
#    SERVER_IP=$(kubectl get svc iperf3-server -o jsonpath='{.spec.clusterIP}')
#
# 4. Run speed test (10 seconds, TCP):
#    kubectl exec -it deployment/iperf3-client -- iperf3 -c $SERVER_IP -t 10
#
# 5. Run speed test with parallel streams (more accurate for bonded links):
#    kubectl exec -it deployment/iperf3-client -- iperf3 -c $SERVER_IP -t 10 -P 4
#
# 6. Run UDP test to check maximum throughput:
#    kubectl exec -it deployment/iperf3-client -- iperf3 -c $SERVER_IP -u -b 2G -t 10
#
# Expected results with balance-xor bonding:
# - TCP: ~1.8-1.9 Gbps (close to 2 Gbps theoretical)
# - UDP: Should hit 2 Gbps with low packet loss
#
# To verify pod placement:
#    kubectl get pods -o wide | grep iperf3
#
# To clean up:
#    kubectl delete -f test-network-speed.yaml
